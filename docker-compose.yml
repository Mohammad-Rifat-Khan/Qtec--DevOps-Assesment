version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: qtec-api:latest
    container_name: qtec-api-1
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - DEBUG=False
      - PORT=8000
    ports:
      - "8000:8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: qtec-nginx:latest
    container_name: qtec-nginx-1
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

networks:
  default:
    name: qtec-network
