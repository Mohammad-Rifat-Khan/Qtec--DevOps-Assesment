apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: qtec-api
  labels:
    app: qtec-api
  annotations:
    description: "Kubernetes Service for Qtec API"
spec:
  type: ClusterIP
  selector:
    app: qtec-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  sessionAffinity: None
  # DNS policy for pod-to-pod communication
  clusterIP: ""
