name: Qtec CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to EC2
      run: |
        ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

        echo "Starting Deployment..."

        cd ~/qtec/Qtec--DevOps-Assesment

        echo "Pull latest code"
        git pull origin main

        echo "Using minikube docker"
        eval $(minikube docker-env)

        echo "Build docker image"
        docker build -t qtec-api -f docker/Dockerfile .

        echo "Restart deployment"
        kubectl rollout restart deployment api-deployment -n qtec-api

        echo "Check pods"
        kubectl get pods -n qtec-api

        echo "Deployment Finished"

        EOF